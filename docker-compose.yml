x-spring-common-env: &spring-common-env
  EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
  SPRING_DATASOURCE_USERNAME: foxwear
  SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
  SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
  SPRING_DATA_REDIS_HOST: redis
  SPRING_DATA_REDIS_PORT: 6379
  JWT_SECRET_KEY: ${JWT_SECRET_KEY}
  ACCESS_KEY: ${ACCESS_KEY}
  SECRET_KEY: ${SECRET_KEY}
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}

services:
  foxwear-db:
    image: postgres:latest
    container_name: foxwear-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: foxwear
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: foxwear_db
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./init-db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - foxwear-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foxwear -d foxwear_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - foxwear-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: foxwear-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - foxwear-network

  redis:
    image: redis:7.2-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - foxwear-network

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - dev
    networks:
      - foxwear-network

  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - foxwear-network

  gateway-service:
    build: ./gateway-service
    container_name: gateway-service
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    depends_on:
      - eureka-server
    networks:
      - foxwear-network

  auth-service:
    build: ./auth-service
    container_name: auth-service
    environment:
      <<: *spring-common-env
      SPRING_DATASOURCE_URL: jdbc:postgresql://foxwear-db:5432/auth_db
    depends_on:
      foxwear-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - foxwear-network

  product-service:
    build: ./product-service
    container_name: product-service
    environment:
      <<: *spring-common-env
      SPRING_DATASOURCE_URL: jdbc:postgresql://foxwear-db:5432/catalog_db
    depends_on:
      foxwear-db:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - foxwear-network

  order-service:
    build: ./order-service
    container_name: order-service
    environment:
      <<: *spring-common-env
      SPRING_DATASOURCE_URL: jdbc:postgresql://foxwear-db:5432/order_db
    depends_on:
      foxwear-db:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - foxwear-network

  notification-service:
    build: ./notification-service
    container_name: notification-service
    environment:
      <<: *spring-common-env
      SPRING_MAIL_PASSWORD: ${GMAIL_APP_PASSWORD}
      SPRING_MAIL_USERNAME: "mreceb0111@gmail.com"
    depends_on:
      - kafka
      - eureka-server
    networks:
      - foxwear-network

  interaction-service:
    build: ./interaction-service
    container_name: interaction-service
    environment:
      <<: *spring-common-env
      SPRING_DATASOURCE_URL: jdbc:postgresql://foxwear-db:5432/interaction_db
    depends_on:
      foxwear-db:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - foxwear-network

  dynamic-data-service:
    build: ./dynamic-data-service
    container_name: dynamic-data-service
    environment:
      <<: *spring-common-env
      SPRING_DATASOURCE_URL: jdbc:postgresql://foxwear-db:5432/dynamic_db
    depends_on:
      foxwear-db:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - foxwear-network

networks:
  foxwear-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: