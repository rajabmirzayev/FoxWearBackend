databaseChangeLog:
  - changeSet:
      id: 16032026-01
      author: rajabmirzayev
      changes:
        - createTable:
            schemaName: dynamic
            tableName: banners
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: image_url
                  type: VARCHAR(255)
              - column:
                  name: mobile_image_url
                  type: VARCHAR(255)
              - column:
                  name: title
                  type: VARCHAR(100)
              - column:
                  name: subtitle
                  type: VARCHAR(255)
              - column:
                  name: button_text
                  type: VARCHAR(50)
              - column:
                  name: button_link
                  type: VARCHAR(255)
              - column:
                  name: sort_order
                  type: INTEGER
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: is_active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
