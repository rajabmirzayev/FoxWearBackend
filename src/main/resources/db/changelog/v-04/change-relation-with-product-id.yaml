databaseChangeLog:
  - changeSet:
      id: 16032026-05
      author: rajabmirzayev
      changes:
        - dropForeignKeyConstraint:
            baseTableName: product_likes
            baseTableSchemaName: interaction
            constraintName: fk_product_likes_color_option
        - dropUniqueConstraint:
            tableName: product_likes
            schemaName: interaction
            constraintName: uk_product_likes_user_color
        - renameColumn:
            tableName: product_likes
            schemaName: interaction
            oldColumnName: product_color_id
            newColumnName: product_id
            columnDataType: BIGINT
        - addForeignKeyConstraint:
            baseTableName: product_likes
            baseTableSchemaName: interaction
            baseColumnNames: product_id
            constraintName: fk_product_likes_product
            referencedTableName: products
            referencedTableSchemaName: catalog
            referencedColumnNames: id
            onDelete: CASCADE
        - addUniqueConstraint:
            tableName: product_likes
            schemaName: interaction
            columnNames: user_id, product_id
            constraintName: unique_user_product
