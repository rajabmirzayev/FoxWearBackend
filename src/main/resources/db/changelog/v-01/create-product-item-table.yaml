databaseChangeLog:
  - changeSet:
      id: 01032026-09
      author: rajabmirzayev
      changes:
        - createTable:
            schemaName: catalog
            tableName: product_item
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: color_option_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    referencedTableName: product_color_options
                    referencedTableSchemaName: catalog
                    referencedColumnNames: id
                    foreignKeyName: fk_product_item_color
              - column:
                  name: product_size_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    referencedTableName: product_sizes
                    referencedTableSchemaName: catalog
                    referencedColumnNames: id
                    foreignKeyName: fk_product_item_size
              - column:
                  name: sku
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: stock_quantity
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: stock_remaining
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: is_deleted
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
        - sql:
            dbms: postgresql
            sql: ALTER TABLE catalog.product_item ADD CONSTRAINT check_stock_integrity CHECK (stock_remaining <= stock_quantity AND stock_remaining >= 0)
