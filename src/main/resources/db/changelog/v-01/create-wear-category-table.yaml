databaseChangeLog:
  - changeSet:
      id: 01032026-04
      author: rajabmirzayev
      changes:
        - createTable:
            schemaName: catalog
            tableName: categories
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: subtitle
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
              - column:
                  name: link
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: main_image
                  type: VARCHAR(10000)
              - column:
                  name: parent_id
                  type: BIGINT
                  constraints:
                    referencedTableName: categories
                    referencedTableSchemaName: catalog
                    referencedColumnNames: id
                    foreignKeyName: fk_category_parent
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP