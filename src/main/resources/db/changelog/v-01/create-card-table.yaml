databaseChangeLog:
  - changeSet:
      id: 01032026-03
      author: rajabmirzayev
      changes:
        - createTable:
            schemaName: auth
            tableName: saved_cards
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: card_holder_name
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: masked_number
                  type: VARCHAR(25)
                  constraints:
                    nullable: false
              - column:
                  name: payment_provider_token
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: expiry_date
                  type: VARCHAR(5)
                  constraints:
                    nullable: false
              - column:
                  name: card_type
                  type: VARCHAR(20)
              - column:
                  name: is_default
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: is_expired
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    referencedTableName: users
                    referencedTableSchemaName: auth
                    referencedColumnNames: id
                    foreignKeyName: fk_card_user
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
