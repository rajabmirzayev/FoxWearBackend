databaseChangeLog:
  - changeSet:
      id: 01032026-16
      author: rajabmirzayev
      changes:
        - createTable:
            schemaName: ordering
            tableName: orders
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: order_number
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: total_original_price
                  type: DECIMAL(12, 2)
                  constraints:
                    nullable: false
              - column:
                  name: total_discount_price
                  type: DECIMAL(12, 2)
                  constraints:
                    nullable: false
              - column:
                  name: coupon_id
                  type: BIGINT
              - column:
                  name: shipping_fee
                  type: DECIMAL(10, 2)
                  constraints:
                    nullable: false
              - column:
                  name: payment_status
                  type: VARCHAR(25)
                  constraints:
                    nullable: false
              - column:
                  name: payment_method
                  type: VARCHAR(25)
                  constraints:
                    nullable: false
              - column:
                  name: address_snapshot
                  type: VARCHAR(700)
                  constraints:
                    nullable: false
              - column:
                  name: latitude_snapshot
                  type: DOUBLE PRECISION
              - column:
                  name: longitude_snapshot
                  type: DOUBLE PRECISION
              - column:
                  name: order_note
                  type: VARCHAR(500)
              - column:
                  name: tracking_number
                  type: VARCHAR(30)
                  constraints:
                    unique: true
              - column:
                  name: estimated_delivery_date
                  type: TIMESTAMP
              - column:
                  name: delivered_at
                  type: TIMESTAMP
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
        - addForeignKeyConstraint:
            baseTableSchemaName: ordering
            baseTableName: orders
            baseColumnNames: user_id
            referencedTableSchemaName: auth
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_orders_user
        - addForeignKeyConstraint:
            baseTableSchemaName: ordering
            baseTableName: orders
            baseColumnNames: coupon_id
            referencedTableSchemaName: catalog
            referencedTableName: coupons
            referencedColumnNames: id
            constraintName: fk_orders_coupon
        - sql:
            dbms: postgresql
            sql: ALTER TABLE ordering.orders ADD CONSTRAINT check_total_prices CHECK (total_original_price >= 0 AND total_discount_price >= 0)
