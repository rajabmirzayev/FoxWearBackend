databaseChangeLog:
  - changeSet:
      id: 01032026-17
      author: rajabmirzayev
      changes:
        - createTable:
            schemaName: ordering
            tableName: order_items
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: order_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_order_items_order
                    referencedTableSchemaName: ordering
                    referencedTableName: orders
                    referencedColumnNames: id
              - column:
                  name: product_item_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_order_items_product_item
                    referencedTableSchemaName: catalog
                    referencedTableName: product_item
                    referencedColumnNames: id
              - column:
                  name: product_title_snapshot
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: quantity
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: price_at_purchase
                  type: DECIMAL(10, 2)
                  constraints:
                    nullable: false
              - column:
                  name: discount_at_purchase
                  type: DECIMAL(10, 2)
              - column:
                  name: sub_total
                  type: DECIMAL(12, 2)
                  constraints:
                    nullable: false
              - column:
                  name: sku_snapshot
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: is_reviewed
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
        - sql:
            dbms: postgresql
            sql: ALTER TABLE ordering.order_items ADD CONSTRAINT check_order_item_prices CHECK (price_at_purchase > 0 AND (discount_at_purchase IS NULL OR discount_at_purchase >= 0) AND sub_total >= 0)
        - sql:
            dbms: postgresql
            sql: ALTER TABLE ordering.order_items ADD CONSTRAINT check_order_item_quantity CHECK (quantity >= 1)
