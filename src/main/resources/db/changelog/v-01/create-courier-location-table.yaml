databaseChangeLog:
  - changeSet:
      id: 01032026-18
      author: rajabmirzayev
      changes:
        - createTable:
            schemaName: ordering
            tableName: courier_locations
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: courier_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    unique: true
                    foreignKeyName: fk_courier_locations_courier
                    referencedTableSchemaName: auth
                    referencedTableName: users
                    referencedColumnNames: id
              - column:
                  name: current_latitude
                  type: DOUBLE PRECISION
              - column:
                  name: current_longitude
                  type: DOUBLE PRECISION
              - column:
                  name: last_updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: is_active
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_courier_id
            schemaName: ordering
            tableName: courier_locations
            columns:
              - column:
                  name: courier_id
