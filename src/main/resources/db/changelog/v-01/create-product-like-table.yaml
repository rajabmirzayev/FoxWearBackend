databaseChangeLog:
  - changeSet:
      id: 01032026-13
      author: rajabmirzayev
      changes:
        - createTable:
            schemaName: interaction
            tableName: product_likes
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: product_color_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_product_likes_color_option
                    referencedTableSchemaName: catalog
                    referencedTableName: product_color_options
                    referencedColumnNames: id
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_product_likes_user
                    referencedTableSchemaName: auth
                    referencedTableName: users
                    referencedColumnNames: id
              - column:
                  name: liked_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            schemaName: interaction
            tableName: product_likes
            columnNames: user_id, product_color_id
            constraintName: uk_product_likes_user_color
