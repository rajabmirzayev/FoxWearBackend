databaseChangeLog:
  - changeSet:
      id: 01032026-07
      author: rajabmirzayev
      changes:
        - createTable:
            schemaName: catalog
            tableName: product_color_options
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: color_name
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: color_code
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: product_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    referencedTableName: products
                    referencedTableSchemaName: catalog
                    referencedColumnNames: id
                    foreignKeyName: fk_product_color_option
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
