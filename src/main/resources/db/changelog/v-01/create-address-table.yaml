databaseChangeLog:
  - changeSet:
      id: 01032026-02
      author: rajabmirzayev
      changes:
        - createTable:
            schemaName: auth
            tableName: addresses
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: city
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: region
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: street
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: block
                  type: VARCHAR(10)
              - column:
                  name: floor
                  type: VARCHAR(10)
              - column:
                  name: door_number
                  type: VARCHAR(10)
              - column:
                  name: door_code
                  type: VARCHAR(20)
              - column:
                  name: full_address_text
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: is_default
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: latitude
                  type: DOUBLE PRECISION
              - column:
                  name: longitude
                  type: DOUBLE PRECISION
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    referencedTableName: users
                    referencedTableSchemaName: auth
                    referencedColumnNames: id
                    foreignKeyName: fk_address_user
